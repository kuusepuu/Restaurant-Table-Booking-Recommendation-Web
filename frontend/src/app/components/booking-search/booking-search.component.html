<div class="search-panel">
  <h3>Find a Table</h3>

  <form [formGroup]="searchForm" (ngSubmit)="onSubmit()">
    <!-- Date -->
    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date">
    </div>

    <!-- Time -->
    <div class="form-group">
      <label for="startTime">Time</label>
      <select id="startTime" formControlName="startTime">
        @for (slot of timeSlots; track slot) {
          <option [value]="slot">{{ slot }}</option>
        }
      </select>
    </div>

    <!-- Duration -->
    <div class="form-group">
      <label for="durationMinutes">Duration</label>
      <select id="durationMinutes" formControlName="durationMinutes">
        <option value="60">1 hour</option>
        <option value="90">1.5 hours</option>
        <option value="120">2 hours</option>
        <option value="150">2.5 hours</option>
        <option value="180">3 hours</option>
      </select>
    </div>

    <!-- Group Size -->
    <div class="form-group">
      <label for="groupSize">Group Size</label>
      <input type="number" id="groupSize" formControlName="groupSize" min="1" max="20">
    </div>

    <!-- Zone Preferences -->
    <div class="form-group zones">
      <label>Preferred Zones</label>
      <div formGroupName="preferredZones" class="checkbox-group">
        @for (zone of zones; track zone) {
          <label class="checkbox-label">
            <input type="checkbox" [formControlName]="zone">
            <span>{{ formatZone(zone) }}</span>
          </label>
        }
      </div>
    </div>

    <!-- Accessibility -->
    <div class="form-group">
      <label class="checkbox-label">
        <input type="checkbox" formControlName="needsAccessible">
        <span>Wheelchair accessible</span>
      </label>
    </div>

    <button type="submit" [disabled]="!searchForm.valid" class="search-btn">
      Find Tables
    </button>
  </form>
</div>
